<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Country Explorer</title>
        <link rel="stylesheet" href="styles.css">
    </head>
    <body>
        <header>
            <h1>Country Explorer</h1>
        </header>

        <main>
            <section class="search-container">
                <input type="text" id="country-input" placeholder="Enter country name...">
                <button id="search-btn">Search</button>
            </section>
            
            <section id="error-message" class="error hidden"></section>

            <section id="loading-spinner" class="spinner hidden"></section>

            <section id="country-info" class="country-card hidden">
                <!-- Country info will be populated here -->
            </section>

            <section id="bordering-countries" class="border-grid hidden">
                <!-- Bordering countries will be populated here -->
            </section>
        </main>

        <script src="script.js"></script>
    </body>
</html>
